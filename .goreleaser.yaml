#
# goreleaser config for bomtique releases. Triggered by
# .github/workflows/release.yml on tag pushes matching `v*`.
#
# Per release this produces:
#   * Cross-compiled binaries (linux + darwin + windows × amd64/arm64,
#     minus windows/arm64). Stamped with -X main.version=<tag>.
#   * tar.gz archives (zip on Windows) bundling LICENSE/README/CHANGELOG.
#   * checksums.txt (SHA-256) covering every archive.
#   * Cosign keyless signatures over the checksums file.
#   * Multi-arch Docker image at ghcr.io/interlynk-io/bomtique
#     (linux/amd64 + linux/arm64 manifest list).
#   * Homebrew formula pushed to interlynk-io/homebrew-interlynk.
#   * GitHub release object with archives, checksums, signatures,
#     and the dogfooded bomtique-self SBOMs (CDX + SPDX) attached.
#
# Local snapshot test (no publish):
#   goreleaser release --snapshot --clean --skip=sign,publish

version: 2

project_name: bomtique

before:
  hooks:
    - go mod tidy

builds:
  - id: bomtique
    main: ./cmd/bomtique
    binary: bomtique
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows/arm64 has no first-party demand yet; revisit on
      # request.
      - goos: windows
        goarch: arm64

archives:
  - id: bomtique
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}Darwin
      {{- else if eq .Os "linux" }}Linux
      {{- else if eq .Os "windows" }}Windows
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - SECURITY.md
      - docs/*.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

signs:
  - id: cosign
    cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    # The workflow is expected to provide keyless-signing env vars
    # (COSIGN_EXPERIMENTAL=1, GitHub OIDC). Without them signing is
    # skipped and the release still produces binaries + checksums.

dockers:
  - id: bomtique-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - 'ghcr.io/interlynk-io/bomtique:{{ .Version }}-amd64'
      - 'ghcr.io/interlynk-io/bomtique:latest-amd64'
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - '--platform=linux/amd64'
      - '--label=org.opencontainers.image.source=https://github.com/interlynk-io/bomtique'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.revision={{ .FullCommit }}'
      - '--label=org.opencontainers.image.licenses=Apache-2.0'
      - '--label=org.opencontainers.image.description=Hand-authored SBOM toolkit'
  - id: bomtique-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - 'ghcr.io/interlynk-io/bomtique:{{ .Version }}-arm64'
      - 'ghcr.io/interlynk-io/bomtique:latest-arm64'
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - '--platform=linux/arm64'
      - '--label=org.opencontainers.image.source=https://github.com/interlynk-io/bomtique'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.revision={{ .FullCommit }}'
      - '--label=org.opencontainers.image.licenses=Apache-2.0'
      - '--label=org.opencontainers.image.description=Hand-authored SBOM toolkit'

docker_manifests:
  - name_template: 'ghcr.io/interlynk-io/bomtique:{{ .Version }}'
    image_templates:
      - 'ghcr.io/interlynk-io/bomtique:{{ .Version }}-amd64'
      - 'ghcr.io/interlynk-io/bomtique:{{ .Version }}-arm64'
  - name_template: 'ghcr.io/interlynk-io/bomtique:latest'
    image_templates:
      - 'ghcr.io/interlynk-io/bomtique:latest-amd64'
      - 'ghcr.io/interlynk-io/bomtique:latest-arm64'

brews:
  - name: bomtique
    repository:
      owner: interlynk-io
      name: homebrew-interlynk
      branch: main
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
      # The tap repo enforces "changes via PR" + "verified signatures"
      # on main. Open a PR for each release instead of pushing direct.
      pull_request:
        enabled: true
    homepage: 'https://github.com/interlynk-io/bomtique'
    description: 'Hand-authored SBOM toolkit: emit CycloneDX/SPDX SBOMs from curated Component Manifests.'
    license: 'Apache-2.0'
    # Commits go through the GitHub Contents API; GitHub web-flow signs
    # them automatically when the committer email matches a verified
    # email on the PAT owner's account. We use the PAT owner's GitHub
    # noreply address (riteshnoronha, user id 147178) so the signature
    # verifies regardless of which mailbox identity the bot prefers.
    commit_author:
      name: riteshnoronha
      email: 147178+riteshnoronha@users.noreply.github.com
    install: |
      bin.install "bomtique"
    test: |
      assert_match "bomtique", shell_output("#{bin}/bomtique --version")

changelog:
  use: github-native

release:
  draft: true
  prerelease: auto
  header: |
    # bomtique {{ .Tag }}

    Reference consumer for the Component Manifest v1 specification.
    See [CHANGELOG.md](./CHANGELOG.md) for release highlights.

    - Container: `docker pull ghcr.io/interlynk-io/bomtique:{{ .Version }}` (multi-arch).
    - Homebrew: `brew install interlynk-io/interlynk/bomtique`.
  extra_files:
    # Dogfooded bomtique-self SBOMs, regenerated by the workflow's
    # "Generate dogfood SBOMs" step before goreleaser runs. Written
    # to ./dist-sbom (untracked) to keep the working tree clean for
    # goreleaser's git-state validator.
    - glob: ./dist-sbom/bomtique-*.cdx.json
    - glob: ./dist-sbom/bomtique-*.spdx.json
